name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container: llvm/llvm:18
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for git diff
      
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git \
            libgit2-dev
      
      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      
      - name: Build project
        run: cmake --build build -j$(nproc)
      
      - name: Setup compile_commands.json for regression tests
        run: |
          mkdir -p tests/CodeLintTest/build
          cp build/compile_commands.json tests/CodeLintTest/build/
      
      - name: Run all tests
        run: cmake --build build --target test-all
      
      - name: Check code formatting
        if: github.event_name == 'pull_request'
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD | \
            grep '\.cpp$\|\.hpp$\|\.h$' | \
            xargs -r clang-format --dry-run --Werror || true
      
      - name: Run clang-tidy
        if: github.event_name == 'pull_request'
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD | \
            grep '\.cpp$' | \
            xargs -r clang-tidy -p build --config-file=.clang-tidy || true