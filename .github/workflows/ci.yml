name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container: ubuntu:22.04
    
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for git diff
      
      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg
          key: vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-

      - name: Install dependencies and vcpkg
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential cmake make git wget lsb-release software-properties-common gnupg \
            libzstd-dev libxml2-dev libedit-dev libncurses-dev zlib1g-dev \
            git curl zip unzip ca-certificates pkg-config
          
          # Install LLVM 18 from apt.llvm.org
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          ./llvm.sh 18
          
          # Install LLVM 18 development packages
          apt-get install -y --no-install-recommends \
            llvm-18-dev \
            clang-18 \
            libclang-18-dev
          
          # Setup vcpkg
          if [ ! -d "vcpkg" ]; then
            git clone https://github.com/Microsoft/vcpkg.git
            ./vcpkg/bootstrap-vcpkg.sh -disableMetrics
          fi

      - name: Install vcpkg packages
        run: ./vcpkg/vcpkg install

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_TOOLCHAIN_FILE=$PWD/vcpkg/scripts/buildsystems/vcpkg.cmake
      
      - name: Debug LLVM libraries
        run: ls -la /usr/lib/llvm-18/lib/ | grep -E "libclang|libLLVM"

      - name: Build project
        run: cmake --build build -j$(nproc)
      
      - name: Setup compile_commands.json for regression tests
        run: |
          mkdir -p tests/CodeLintTest/build
          cp build/compile_commands.json tests/CodeLintTest/build/
      
      - name: Run all tests
        run: cmake --build build --target test-all
      
      - name: Check code formatting
        if: github.event_name == 'pull_request'
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD | \
            grep '\.cpp$\|\.hpp$\|\.h$' | \
            xargs -r clang-format --dry-run --Werror
      
      - name: Run clang-tidy
        if: github.event_name == 'pull_request'
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD | \
            grep '\.cpp$' | \
            xargs -r clang-tidy -p build --config-file=.clang-tidy