name: Build and Release

permissions:
  contents: write

on:
  push:
    tags: ['v*']

jobs:
  # Job 1: Static build (Ubuntu 24.04 + vcpkg)
  static:
    runs-on: ubuntu-24.04
    
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg
            ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-static-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-static-
      
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake git curl zip unzip tar \
            pkg-config autoconf automake libtool \
            python3 ninja-build

      - name: Setup vcpkg
        run: |
          if [ ! -d "vcpkg" ]; then
            git clone https://github.com/Microsoft/vcpkg.git
            ./vcpkg/bootstrap-vcpkg.sh -disableMetrics
          fi

      - name: Install vcpkg packages (static)
        run: |
          ./vcpkg/vcpkg install --triplet=x64-linux-static

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$PWD/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=x64-linux-static \
            -DCMAKE_EXE_LINKER_FLAGS="-static"

      - name: Build static binary
        run: |
          cmake --build build -j$(nproc)

      - name: Verify static linking
        run: |
          echo "=== Binary Info ==="
          file build/codelint
          echo "=== Dynamic Dependencies ==="
          ldd build/codelint 2>&1 || echo "Static or minimal deps"
          echo "=== Size ==="
          ls -lh build/codelint
          echo "=== Version Check ==="
          ./build/codelint --version

      - name: Package tar.gz
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          tar -czvf codelint-${VERSION}-linux-x86_64-static.tar.gz \
            -C build codelint

      - name: Upload static artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-artifact
          path: codelint-*.tar.gz
          retention-days: 5

  # Job 2: AppImage (Ubuntu 22.04 + vcpkg dynamic)
  appimage:
    runs-on: ubuntu-latest
    container: ubuntu:22.04
    
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg
          key: vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-
      
      - name: Install dependencies and vcpkg
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential cmake git python3 wget file \
            curl zip unzip ca-certificates pkg-config
          
          # Setup vcpkg
          if [ ! -d "vcpkg" ]; then
            git clone https://github.com/Microsoft/vcpkg.git
            ./vcpkg/bootstrap-vcpkg.sh -disableMetrics
          fi
      
      - name: Install vcpkg packages
        run: ./vcpkg/vcpkg install
      
      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$PWD/vcpkg/scripts/buildsystems/vcpkg.cmake
      
      - name: Build binary
        run: |
          cmake --build build -j$(nproc)
      
      - name: Verify binary
        run: |
          ./build/codelint --version
      
      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
      
      - name: Create AppDir structure
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          mkdir -p AppDir/usr/bin
          cp build/codelint AppDir/usr/bin/
          
          # Create AppRun
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          exe="$(dirname "$(readlink -f "$0")")/usr/bin/codelint"
          exec "$exe" "$@"
          EOF
          chmod +x AppDir/AppRun
          
          # Create desktop file
          cat > AppDir/codelint.desktop << 'EOF'
          [Desktop Entry]
          Name=codelint
          Comment=Code linting tool
          Exec=codelint
          Icon=codelint
          Type=Application
          Categories=Development;
          EOF
          
          # Create icon
          cat > AppDir/codelint.svg << 'EOF'
          <svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
            <rect width="128" height="128" fill="#3B82F6" rx="16"/>
            <text x="64" y="80" text-anchor="middle" font-family="monospace" font-size="48" fill="white" font-weight="bold">C++</text>
            <text x="64" y="110" text-anchor="middle" font-family="sans-serif" font-size="16" fill="white" font-weight="bold">codelint</text>
          </svg>
          EOF
      
      - name: Build AppImage
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run AppDir codelint-${VERSION}-linux-x86_64.AppImage
      
      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage-artifact
          path: codelint-*.AppImage
          retention-days: 5

  # Job 3: Release
  release:
    needs: [static, appimage]
    if: always() && (needs.static.result == 'success' || needs.appimage.result == 'success')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download static artifact
        if: needs.static.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: static-artifact
          path: artifacts
      
      - name: Download AppImage artifact
        if: needs.appimage.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: appimage-artifact
          path: artifacts
      
      - name: List artifacts
        run: |
          ls -la artifacts/
      
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          gh release create v$VERSION \
            --title "v$VERSION" \
            --generate-notes \
            artifacts/*
