name: Whitespace Check

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  check-whitespace:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Check trailing whitespace
        run: |
          echo "🔍 Checking for trailing whitespace..."
          if grep -r '[[:blank:]]$' \
              --include='*.cpp' \
              --include='*.h' \
              --include='*.txt' \
              --include='*.md' \
              --include='*.sh' \
              --include='*.py' \
              . 2>/dev/null | grep -v '.git/'; then
            echo "::error::Found trailing whitespace!"
            echo "Please run './scripts/format.sh' to fix."
            exit 1
          fi
          echo "✅ No trailing whitespace found"
      
      - name: Check trailing newlines
        run: |
          echo "🔍 Checking trailing newlines..."
          
          find . -type f \( \
            -name '*.cpp' -o \
            -name '*.h' -o \
            -name '*.txt' -o \
            -name '*.md' -o \
            -name '*.sh' -o \
            -name '*.py' \
            \) \
            ! -path './build/*' \
            ! -path './.git/*' \
            -exec sh -c '
              errors=0
              for file; do
                # Check for multiple trailing newlines
                last_two=$(tail -c 2 "$file" 2>/dev/null | od -An -tx1 | tr -d " \n")
                if [ "$last_two" = "0a0a" ]; then
                  echo "Multiple trailing newlines: $file"
                  errors=$((errors + 1))
                  continue
                fi
                
                # Check for missing newline
                last=$(tail -c 1 "$file" 2>/dev/null | od -An -tx1 | tr -d " \n")
                if [ "$last" != "0a" ]; then
                  echo "Missing trailing newline: $file"
                  errors=$((errors + 1))
                fi
              done
              exit $errors
            ' sh {} +
          
          if [ $? -ne 0 ]; then
            echo "::error::Trailing newline check failed!"
            echo "Please run './scripts/format.sh' to fix."
            exit 1
          fi
          echo "✅ All files have correct trailing newlines"
      
      - name: Summary
        run: |
          echo "✨ Whitespace check passed!"
          echo "📊 Total files checked: $(find . -type f \( -name '*.cpp' -o -name '*.h' -o -name '*.txt' -o -name '*.md' -o -name '*.sh' -o -name '*.py' \) ! -path './build/*' ! -path './.git/*' | wc -l | tr -d ' ')"